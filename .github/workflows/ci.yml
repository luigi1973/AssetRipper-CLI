name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/AssetRipper.Tools.ExportRunner/AssetRipper.Tools.ExportRunner.csproj

      - name: Build
        run: dotnet build src/AssetRipper.Tools.ExportRunner/AssetRipper.Tools.ExportRunner.csproj -c Release --no-restore
